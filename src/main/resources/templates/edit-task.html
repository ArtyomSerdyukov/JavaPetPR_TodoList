<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование задачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 class="mt-5 text-center">Редактирование задачи</h1>

    <form th:action="@{/update/{id}(id=${task.id})}" method="post" class="row mt-3">
        <div class="col-md-10">
            <input class="form-control form-control-lg" type="text"
                   name="title" th:value="${task.title}" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success btn-lg btn-block">Обновить</button>
        </div>
        <div class="col-md-2 mt-2">
            <a href="/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
